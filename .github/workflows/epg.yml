name: EPG Grabber

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *" 
    - cron: "00 22 * * *" 
    
permissions:
  contents: write

jobs:
  run-epg:
    runs-on: ubuntu-latest
    env:
      EPG_REPO_NAME: ${{ secrets.EPG_REPO_NAME }}
      EPG_REPO_PAT: ${{ secrets.EPG_REPO_PAT }}
      EPG_ZIP_PASSWORD: ${{ secrets.EPG_ZIP_PASSWORD }}
      EPG_JIO_URL: ${{ secrets.EPG_JIO_URL }}
      TZ: Asia/Kolkata
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.EPG_REPO_NAME }}
          ref: main
          token: ${{ env.EPG_REPO_PAT }}

      - name: Pull latest changes
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: xml, imagick, zip, curl

      - name: Install Node.js dependencies
        run: npm install --silent --no-audit --no-fund --legacy-peer-deps

      - name: Install Python dependencies
        run: |
          [ -f requirements.txt ] && pip install -q -r requirements.txt || true

      - name: Install 7-Zip
        run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full

      - name: Grab all EPG in parallel
        run: |
          set -e
          grab_provider() {
            PROVIDER_PATH=$1
            BASENAME=$(basename "$PROVIDER_PATH" .xml)
            OUTFILE="tmp_xml/${BASENAME}.xml"
            mkdir -p tmp_xml
            if [ -f "sites/$PROVIDER_PATH" ]; then
              echo "[$BASENAME] Running grab..."
              if ! npm run grab --silent -- --channels="sites/$PROVIDER_PATH" --maxConnections=10 --days=2 --output="$OUTFILE" > /dev/null 2>&1; then
                echo "[$BASENAME] ❌ Failed, creating placeholder..."
                echo "<?xml version='1.0' encoding='UTF-8'?><tv></tv>" > "$OUTFILE"
              else
                echo "[$BASENAME] ✅ Success"
              fi
            else
              echo "[$BASENAME] ⚠️ Channel file not found, creating placeholder XML..."
              echo "<?xml version='1.0' encoding='UTF-8'?><tv></tv>" > "$OUTFILE"
            fi
          }
          while read PROVIDER_PATH || [ -n "$PROVIDER_PATH" ]; do
            grab_provider "$PROVIDER_PATH" &
          done < scripts/epg/sites.txt
          wait

      - name: Merge XMLs
        run: python3 -u scripts/epg/epg_grabber.py > /dev/null 2>&1 && echo "✅ Merged XMLs"

      - name: Run EPG Downloader (nightly)
        if: github.event.schedule == '00 22 * * *'
        run: python3 -u scripts/epg/epg_downloader.py --url "$EPG_JIO_URL" > /dev/null 2>&1 && echo "✅ EPG Downloader finished"

      - name: Tempest PHP grabber
        run: |
          mkdir -p temp_epg
          7z x tempest_epg_grabber.zip -p"$EPG_ZIP_PASSWORD" -otemp_epg > /dev/null
          php -d date.timezone=Asia/Kolkata temp_epg/tempest.php --epg config=tempest.config.xml > /dev/null 2>&1
          python3 -u scripts/epg/tempest_epg.py > /dev/null 2>&1
          rm -f temp_epg/tempest_config/epg/epg.xml
          rm -f tempest_epg_grabber.zip
          7z a -tzip -p"$EPG_ZIP_PASSWORD" tempest_epg_grabber.zip ./temp_epg/* > /dev/null
          rm -rf temp_epg

      - name: 💾 Commit and push updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📺 Automatically updated Playlist & generate JSON"
          file_pattern: |
            public/guide/*.xml.gz
            tempest_epg_grabber.zip
