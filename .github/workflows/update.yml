name: Update All Playlists

on:
  schedule:
    - cron: "*/15 * * * *"   # Runs every 15 minutes
  workflow_dispatch:

concurrency:
  group: update-playlists
  cancel-in-progress: false

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      # -------------------------
      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # -------------------------
      # Install dependencies
      - name: Install dependencies
        run: pip install requests

      # -------------------------
      # Always run Fancode & Willow (every 15 minutes)
      - name: Update Fancode Playlist
        env:
          FANCODE_INPUT_PATH: ${{ secrets.FANCODE_INPUT_PATH }}
          FANCODE_OUTPUT_PATH: ${{ secrets.FANCODE_OUTPUT_PATH }}
          FANCODE_URL: ${{ secrets.FANCODE_URL }}
        run: python scripts/update_fancode.py

      - name: Update Willow Playlist
        env:
          WILLOW_INPUT_PATH: ${{ secrets.WILLOW_INPUT_PATH }}
          WILLOW_OUTPUT_PATH: ${{ secrets.WILLOW_OUTPUT_PATH }}
          WILLOW_URL: ${{ secrets.WILLOW_URL }}
        run: python scripts/update_willow.py

      # -------------------------
      # Run JioTVPlus, Zee5, SonyLIV only once every hour
      - name: Conditionally Update Hourly Playlists
        run: |
          MINUTE=$(date +%M)
          echo "🕒 Current minute: $MINUTE"
          if (( 10#$MINUTE == 0 )); then
            echo "⏰ Running hourly updates for JioTVPlus, Zee5 & SonyLIV..."
            python scripts/update_jiotvplus.py
            python scripts/update_zee5.py
            python scripts/update_sonyliv.py
          else
            echo "⏩ Skipping hourly playlists this run."
          fi
        env:
          JIOTVPLUS_INPUT: ${{ secrets.JIOTVPLUS_INPUT_PATH }}
          JIOTVPLUS_OUTPUT: ${{ secrets.JIOTVPLUS_OUTPUT_PATH }}
          JIOTVPLUS_URL: ${{ secrets.JIOTVPLUS_URL }}

          ZEE5_INPUT: ${{ secrets.ZEE5_INPUT_PATH }}
          ZEE5_OUTPUT: ${{ secrets.ZEE5_OUTPUT_PATH }}
          ZEE5_URL: ${{ secrets.ZEE5_URL }}

          SONYLIV_INPUT_PATH: ${{ secrets.SONYLIV_INPUT_PATH }}
          SONYLIV_OUTPUT_PATH: ${{ secrets.SONYLIV_OUTPUT_PATH }}
          SONYLIV_URL: ${{ secrets.SONYLIV_URL }}

      # -------------------------
      # Commit & Push only if any playlist changed
      - name: Commit and Push Updated Playlists
        run: |
          set -e

          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED_PLAYLISTS=()

          echo -e "${YELLOW}🔍 Checking for playlist changes...${NC}"

          # --- JioTVPlus ---
          git add "${{ secrets.JIOTVPLUS_OUTPUT_PATH }}" || true
          if ! git diff --cached --quiet "${{ secrets.JIOTVPLUS_OUTPUT_PATH }}"; then
            CHANGED_PLAYLISTS+=("JioTVPlus")
            echo -e "${GREEN}✅ JioTVPlus playlist updated.${NC}"
          else
            echo -e "${YELLOW}⚪ JioTVPlus playlist unchanged.${NC}"
            git restore --staged "${{ secrets.JIOTVPLUS_OUTPUT_PATH }}" || true
          fi

          # --- Zee5 ---
          git add "${{ secrets.ZEE5_OUTPUT_PATH }}" || true
          if ! git diff --cached --quiet "${{ secrets.ZEE5_OUTPUT_PATH }}"; then
            CHANGED_PLAYLISTS+=("Zee5")
            echo -e "${GREEN}✅ Zee5 playlist updated.${NC}"
          else
            echo -e "${YELLOW}⚪ Zee5 playlist unchanged.${NC}"
            git restore --staged "${{ secrets.ZEE5_OUTPUT_PATH }}" || true
          fi

          # --- SonyLIV ---
          git add "${{ secrets.SONYLIV_OUTPUT_PATH }}" || true
          if ! git diff --cached --quiet "${{ secrets.SONYLIV_OUTPUT_PATH }}"; then
            CHANGED_PLAYLISTS+=("SonyLIV")
            echo -e "${GREEN}✅ SonyLIV playlist updated.${NC}"
          else
            echo -e "${YELLOW}⚪ SonyLIV playlist unchanged.${NC}"
            git restore --staged "${{ secrets.SONYLIV_OUTPUT_PATH }}" || true
          fi

          # --- Fancode ---
          git add "${{ secrets.FANCODE_OUTPUT_PATH }}" || true
          if ! git diff --cached --quiet "${{ secrets.FANCODE_OUTPUT_PATH }}"; then
            CHANGED_PLAYLISTS+=("Fancode")
            echo -e "${GREEN}✅ Fancode playlist updated.${NC}"
          else
            echo -e "${YELLOW}⚪ Fancode playlist unchanged.${NC}"
            git restore --staged "${{ secrets.FANCODE_OUTPUT_PATH }}" || true
          fi

          # --- Willow ---
          git add "${{ secrets.WILLOW_OUTPUT_PATH }}" || true
          if ! git diff --cached --quiet "${{ secrets.WILLOW_OUTPUT_PATH }}"; then
            CHANGED_PLAYLISTS+=("Willow")
            echo -e "${GREEN}✅ Willow playlist updated.${NC}"
          else
            echo -e "${YELLOW}⚪ Willow playlist unchanged.${NC}"
            git restore --staged "${{ secrets.WILLOW_OUTPUT_PATH }}" || true
          fi

          # --- Commit & Push ---
          if [ ${#CHANGED_PLAYLISTS[@]} -ne 0 ]; then
            git commit -m "🔄 Auto-update playlists: ${CHANGED_PLAYLISTS[*]}"
            git pull --rebase origin main || git rebase --abort
            git push origin main
            echo -e "${GREEN}✅ Changes pushed for: ${CHANGED_PLAYLISTS[*]}${NC}"
          else
            echo -e "${RED}🚫 No playlists changed. Skipping commit.${NC}"
          fi
