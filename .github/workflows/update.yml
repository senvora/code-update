name: Update All Playlists

on:
  schedule:
    - cron: "*/15 * * * *"   # Runs every 15 minutes
  workflow_dispatch:

concurrency:
  group: update-playlists
  cancel-in-progress: false

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    env:
      # Multi-line string for all playlists
      # Format: Name|InputSecret|OutputSecret|URLSecret|IntervalInMinutes
      PLAYLISTS: |
        Fancode|FANCODE_INPUT_PATH|FANCODE_OUTPUT_PATH|FANCODE_URL|15
        Willow|WILLOW_INPUT_PATH|WILLOW_OUTPUT_PATH|WILLOW_URL|15
        JioTVPlus|JIOTVPLUS_INPUT_PATH|JIOTVPLUS_OUTPUT_PATH|JIOTVPLUS_URL|60
        Zee5|ZEE5_INPUT_PATH|ZEE5_OUTPUT_PATH|ZEE5_URL|60
        SonyLIV|SONYLIV_INPUT_PATH|SONYLIV_OUTPUT_PATH|SONYLIV_URL|60

    steps:
      # -------------------------
      # Checkout repo
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      # -------------------------
      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # -------------------------
      # Install dependencies
      - name: Install dependencies
        run: pip install requests

      # -------------------------
      # Update playlists
      - name: Update Playlists
        shell: bash
        run: |
          set -e

          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED_PLAYLISTS=()
          MINUTE=$(date +%M)
          echo "🕒 Current minute: $MINUTE"

          # Loop through all playlists
          while IFS='|' read -r NAME INPUT_SECRET OUTPUT_SECRET URL_SECRET INTERVAL; do
            # Only run playlist if interval matches
            if (( INTERVAL == 15 || 10#$MINUTE % INTERVAL == 0 )); then
              echo "⏰ Updating $NAME..."
              python scripts/update_${NAME,,}.py
            else
              echo "⏩ Skipping $NAME this run"
            fi

            # Resolve output path from secret
            OUTPUT_PATH="${!OUTPUT_SECRET}"
            if [ -f "$OUTPUT_PATH" ]; then
              git add "$OUTPUT_PATH"
              if ! git diff --cached --quiet "$OUTPUT_PATH"; then
                CHANGED_PLAYLISTS+=("$NAME")
                echo -e "${GREEN}✅ $NAME playlist updated.${NC}"
              else
                echo -e "${YELLOW}⚪ $NAME playlist unchanged.${NC}"
                git restore --staged "$OUTPUT_PATH" || true
              fi
            else
              echo -e "${RED}⚠ $NAME output file does not exist: $OUTPUT_PATH${NC}"
            fi

          done <<< "$PLAYLISTS"

          # Commit & push changes
          if [ ${#CHANGED_PLAYLISTS[@]} -ne 0 ]; then
            git commit -m "🔄 Auto-update playlists: ${CHANGED_PLAYLISTS[*]}"
            git pull --rebase origin main || git rebase --abort
            git push origin main
            echo -e "${GREEN}✅ Changes pushed for: ${CHANGED_PLAYLISTS[*]}${NC}"
          else
            echo -e "${RED}🚫 No playlists changed. Skipping commit.${NC}"
          fi  
