name: Update All Playlists

on:
  schedule:
    - cron: "*/15 * * * *"   # Runs every 15 minutes
  workflow_dispatch:

concurrency:
  group: update-playlists
  cancel-in-progress: false

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      # -------------------------
      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # -------------------------
      # Install dependencies
      - name: Install dependencies
        run: pip install requests

      # -------------------------
      # Run Fancode & Willow (every 15 minutes)
      - name: Update Fancode Playlist
        env:
          FANCODE_INPUT_PATH: ${{ secrets.FANCODE_INPUT_PATH }}
          FANCODE_OUTPUT_PATH: ${{ secrets.FANCODE_OUTPUT_PATH }}
          FANCODE_URL: ${{ secrets.FANCODE_URL }}
        run: python scripts/update_fancode.py

      - name: Update Willow Playlist
        env:
          WILLOW_INPUT_PATH: ${{ secrets.WILLOW_INPUT_PATH }}
          WILLOW_OUTPUT_PATH: ${{ secrets.WILLOW_OUTPUT_PATH }}
          WILLOW_URL: ${{ secrets.WILLOW_URL }}
        run: python scripts/update_willow.py

      # -------------------------
      # Run JioTVPlus, Zee5, SonyLIV only once every hour
      - name: Conditionally Update Hourly Playlists
        shell: bash
        run: |
          MINUTE=$(date +%M)
          echo "🕒 Current minute: $MINUTE"

          if (( 10#$MINUTE == 0 )); then
            echo "⏰ Running hourly updates for JioTVPlus, Zee5 & SonyLIV..."
            python scripts/update_jiotvplus.py
            python scripts/update_zee5.py
            python scripts/update_sonyliv.py
          else
            echo "⏩ Skipping hourly playlists this run."
          fi
        env:
          JIOTVPLUS_INPUT: ${{ secrets.JIOTVPLUS_INPUT_PATH }}
          JIOTVPLUS_OUTPUT: ${{ secrets.JIOTVPLUS_OUTPUT_PATH }}
          JIOTVPLUS_URL: ${{ secrets.JIOTVPLUS_URL }}

          ZEE5_INPUT: ${{ secrets.ZEE5_INPUT_PATH }}
          ZEE5_OUTPUT: ${{ secrets.ZEE5_OUTPUT_PATH }}
          ZEE5_URL: ${{ secrets.ZEE5_URL }}

          SONYLIV_INPUT_PATH: ${{ secrets.SONYLIV_INPUT_PATH }}
          SONYLIV_OUTPUT_PATH: ${{ secrets.SONYLIV_OUTPUT_PATH }}
          SONYLIV_URL: ${{ secrets.SONYLIV_URL }}

      # -------------------------
      # Commit & Push only if any playlist changed
      - name: Commit and Push Updated Playlists
        shell: bash
        run: |
          set -e

          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED_PLAYLISTS=()

          echo -e "${YELLOW}🔍 Checking for playlist changes...${NC}"

          # -------------------------
          # Function to safely add & check a playlist
          check_playlist() {
            local FILE=$1
            local NAME=$2
            sleep 1
            if [ -f "$FILE" ]; then
              git add "$FILE"
              if ! git diff --cached --quiet "$FILE"; then
                CHANGED_PLAYLISTS+=("$NAME")
                echo -e "${GREEN}✅ $NAME playlist updated.${NC}"
              else
                echo -e "${YELLOW}⚪ $NAME playlist unchanged.${NC}"
                git restore --staged "$FILE" || true
              fi
            else
              echo -e "${RED}⚠ $NAME output file does not exist: $FILE${NC}"
            fi
          }

          # -------------------------
          # Check all playlists
          check_playlist "${{ secrets.JIOTVPLUS_OUTPUT_PATH }}" "JioTVPlus"
          check_playlist "${{ secrets.ZEE5_OUTPUT_PATH }}" "Zee5"
          check_playlist "${{ secrets.SONYLIV_OUTPUT_PATH }}" "SonyLIV"
          check_playlist "${{ secrets.FANCODE_OUTPUT_PATH }}" "Fancode"
          check_playlist "${{ secrets.WILLOW_OUTPUT_PATH }}" "Willow"

          # -------------------------
          # Commit & push if anything changed
          if [ ${#CHANGED_PLAYLISTS[@]} -ne 0 ]; then
            git commit -m "🔄 Auto-update playlists: ${CHANGED_PLAYLISTS[*]}"
            git pull --rebase origin main || git rebase --abort
            git push origin main
            echo -e "${GREEN}✅ Changes pushed for: ${CHANGED_PLAYLISTS[*]}${NC}"
          else
            echo -e "${RED}🚫 No playlists changed. Skipping commit.${NC}"
